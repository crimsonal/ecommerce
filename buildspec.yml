version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing dependencies...
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo Building the React app...
      - npm run build
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id E1PNF9YEPZ7C4M --paths "/*"


artifacts:
  files:
    - '**/*'
  base-directory: dist
  discard-paths: no